<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elementus: The Inferno - Journey Map</title>
  <style>
    /* ==========================================
       1. PAGE STYLE & GRAPHITE/FIRE THEME
       ========================================== */
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #ff4a4a; /* Flame Red */
      margin-bottom: 30px;
      font-size: 2.2rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(255, 74, 74, 0.3);
    }

    /* Grid layout for player cards */
    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ==========================================
       2. CARD COMPONENT
       ========================================== */
    .player-card {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
      transition: transform 0.2s, border-color 0.2s;
    }

    .player-card:hover {
      transform: translateY(-3px);
      border-color: #ff4a4a;
    }

    /* Card Header */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2d2d2d;
      padding-bottom: 10px;
      margin-bottom: 12px;
    }

    .card-header h3 {
      margin: 0;
      font-size: 1.3rem;
      color: #fff;
    }

    /* Badges */
    .badge {
      font-size: 0.7rem;
      font-weight: bold;
      padding: 4px 8px;
      border-radius: 12px;
      text-transform: uppercase;
    }
    .badge.champion { background-color: #ffd700; color: #121212; }
    .badge.finalist { background-color: #c0c0c0; color: #121212; }
    .badge.all-star { background-color: #ff4a4a; color: #fff; }

    /* Custom Brief Description */
    .card-description {
      font-size: 0.85rem;
      color: #b0b0b0;
      font-style: italic;
      margin: 0 0 15px 0;
      line-height: 1.4;
      background: rgba(0, 0, 0, 0.2);
      padding: 8px 10px;
      border-radius: 4px;
      border-left: 3px solid #ff4a4a;
    }

    /* Status Details */
    .card-body {
      font-size: 0.85rem;
      margin-bottom: 15px;
      color: #aaa;
    }

    .card-body p {
      margin: 4px 0;
    }

    /* ==========================================
       3. JOURNEY TIMELINE / TREE-LINE
       ========================================== */
    .timeline-container {
      margin-top: auto;
      background: rgba(255, 255, 255, 0.02);
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #2a2a2a;
    }

    .timeline-title {
      font-size: 0.65rem;
      text-transform: uppercase;
      color: #777;
      letter-spacing: 1px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    /* Horizontal list of steps */
    .timeline-nodes {
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    /* Clean thin scrollbar for long timelines */
    .timeline-nodes::-webkit-scrollbar {
      height: 3px;
    }
    .timeline-nodes::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 2px;
    }

    /* Single Node Step */
    .timeline-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 0.6rem;
      text-align: center;
      min-width: 65px;
    }

    .node-phase {
      color: #666;
      font-size: 0.5rem;
      margin-bottom: 2px;
      text-transform: uppercase;
    }

    .node-team {
      background: #222;
      color: #bbb;
      padding: 3px 5px;
      border-radius: 3px;
      font-weight: bold;
      border: 1px solid #444;
      white-space: nowrap;
    }

    /* Team Highlight Border Colors */
    .team-contenders { border-color: #3498db; color: #3498db; }
    .team-champions { border-color: #f1c40f; color: #f1c40f; }
    .team-merge { border-color: #9b59b6; color: #9b59b6; }

    /* Arrows */
    .timeline-arrow {
      color: #444;
      font-size: 0.75rem;
      user-select: none;
    }
  </style>
</head>
<body>

      { "Name": "Dianne", "Legacy": "CHAMPION", "Original": "Champions", "Cycle 16": "Contenders", "Cycle 17": "Contenders", "Shuffle": "", "Expand": "", "Swap": "", "Cycle 34": "", "Cycle 35": "", "2nd Exp": "", "Switch": "", "Disolve": "", "Merge": "", "Status": "Walked", "Episode": "Episode 121" },
      { "Name": "Frank", "Legacy": "FINALIST", "Original": "Contenders", "Cycle 16": "Contenders", "Cycle 17": "Contenders", "Shuffle": "", "Expand": "", "Swap": "", "Cycle 34": "", "Cycle 35": "", "2nd Exp": "", "Switch": "", "Disolve": "", "Merge": "", "Status": "Walked", "Episode": "Episode 122" }
    ];

    function createPlayerCard(player) {
      // Dynamic description generator
      const description = `${player.Name} entered the competition as a ${player.Legacy} assigned to the ${player.Original} squad. ` +
                          `They ended their run as '${player.Status}' during ${player.Episode}.`;

      // Complete cycle list chronologically
      const cycles = [
        { label: 'Start', key: 'Original' },
        { label: 'C16', key: 'Cycle 16' },
        { label: 'C17', key: 'Cycle 17' },
        { label: 'Shuffle', key: 'Shuffle' },
        { label: 'Expand', key: 'Expand' },
        { label: 'Swap', key: 'Swap' },
        { label: 'C34', key: 'Cycle 34' },
        { label: 'C35', key: 'Cycle 35' },
        { label: '2nd Exp', key: '2nd Exp' },
        { label: 'Switch', key: 'Switch' },
        { label: 'Dissolve', key: 'Disolve' },
        { label: 'Merge', key: 'Merge' }
      ];

      // Build the active timeline steps
      let activeSteps = [];
      cycles.forEach(phase => {
        const teamName = player[phase.key];
        if (teamName && teamName.trim() !== "" && teamName !== "nan") {
          activeSteps.push({ label: phase.label, team: teamName });
        }
      });

      const timelineHTML = activeSteps.map((step, idx) => {
        const teamClass = `team-${step.team.toLowerCase().replace(/\s+/g, '-')}`;
        const stepHTML = `
          <div class="timeline-node">
            <span class="node-phase">${step.label}</span>
            <span class="node-team ${teamClass}">${step.team}</span>
          </div>
        `;
        return idx < activeSteps.length - 1 ? stepHTML + `<span class="timeline-arrow">➔</span>` : stepHTML;
      }).join('');

      return `
        <div class="player-card">
          <div>
            <div class="card-header">
              <h3>${player.Name}</h3>
              <span class="badge ${player.Legacy.toLowerCase().replace(/\s+/g, '-')}">${player.Legacy}</span>
            </div>
            <p class="card-description">"${description}"</p>
            <div class="card-body">
              <p><strong>Status:</strong> ${player.Status}</p>
              <p><strong>Episode:</strong> ${player.Episode}</p>
            </div>
          </div>
          <div class="timeline-container">
            <div class="timeline-title">Journey Map</div>
            <div class="timeline-nodes">${timelineHTML || '<span style="font-size:0.7rem; color:#666;">No history</span>'}</div>
          </div>
        </div>
      `;
    }

    // Render cards directly on page load
    const grid = document.getElementById('cards-grid');
    playersData.forEach(player => {
      grid.innerHTML += createPlayerCard(player);
    });
  </script>
</body>
</html>
