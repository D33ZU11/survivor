<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elementus: The Inferno - Contestant Journey</title>
  <style>
    /* ==========================================
       1. PAGE STYLING & THEME
       ========================================== */
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #ff4a4a; /* Flame theme red */
      margin-bottom: 30px;
      font-size: 2.5rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Container holding all the player cards */
    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ==========================================
       2. PLAYER CARD DESIGN
       ========================================== */
    .player-card {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      transition: transform 0.2s, border-color 0.2s;
    }

    .player-card:hover {
      transform: translateY(-5px);
      border-color: #ff4a4a;
    }

    /* Card Header with Name & Badges */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
      margin-bottom: 12px;
    }

    .card-header h3 {
      margin: 0;
      font-size: 1.4rem;
      color: #fff;
    }

    /* Legacy Badges */
    .badge {
      font-size: 0.75rem;
      font-weight: bold;
      padding: 4px 8px;
      border-radius: 12px;
      text-transform: uppercase;
    }
    .badge.champion { background-color: #ffd700; color: #121212; }
    .badge.finalist { background-color: #c0c0c0; color: #121212; }
    .badge.all-star { background-color: #ff4a4a; color: #fff; }

    /* Custom Narrative Description */
    .card-description {
      font-size: 0.85rem;
      color: #b0b0b0;
      font-style: italic;
      margin: 0 0 15px 0;
      line-height: 1.4;
      background: rgba(0, 0, 0, 0.2);
      padding: 10px;
      border-radius: 4px;
      border-left: 3px solid #ff4a4a;
    }

    /* Card Basic Info (Status / Episode) */
    .card-body {
      font-size: 0.9rem;
      margin-bottom: 15px;
    }

    .card-body p {
      margin: 5px 0;
    }

    /* ==========================================
       3. JOURNEY TIMELINE / TREE-LINE
       ========================================== */
    .timeline-container {
      margin-top: auto; /* Pushes the timeline to the bottom of the card */
      background: rgba(255, 255, 255, 0.03);
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #2d2d2d;
    }

    .timeline-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #888;
      letter-spacing: 1px;
      margin-bottom: 8px;
      font-weight: bold;
    }

    /* Horizontal scroll area for the timeline path */
    .timeline-nodes {
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 6px;
    }

    /* Custom thin scrollbar */
    .timeline-nodes::-webkit-scrollbar {
      height: 4px;
    }
    .timeline-nodes::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 2px;
    }

    /* Individual Timeline Node */
    .timeline-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 0.65rem;
      text-align: center;
      min-width: 65px;
    }

    .node-phase {
      color: #777;
      font-size: 0.55rem;
      margin-bottom: 3px;
      text-transform: uppercase;
    }

    .node-team {
      background: #222;
      color: #bbb;
      padding: 4px 6px;
      border-radius: 4px;
      font-weight: bold;
      border: 1px solid #444;
      white-space: nowrap;
    }

    /* Team Specific Border Colors */
    .team-contenders { border-color: #3498db; color: #3498db; }
    .team-champions { border-color: #f1c40f; color: #f1c40f; }
    .team-merge { border-color: #9b59b6; color: #9b59b6; }

    /* Simple arrow divider between team nodes */
    .timeline-arrow {
      color: #555;
      font-size: 0.8rem;
      user-select: none;
    }
  </style>
</head>
<body>

  <h1>Elementus: The Inferno</h1>
  
  <!-- The main container where JavaScript will inject the player cards -->
  <div class="grid-container" id="cards-grid"></div>

  <!-- ==========================================
       4. INTERACTIVE LOGIC & RENDERING
       ========================================== -->
  <script>
    // 1. Function to build the card markup for a single player
    function createPlayerCard(player) {
      
      // Dynamic narrative generator
      const summaryText = `${player.Name} entered the competition as a ${player.Legacy} assigned to the ${player.Original} squad. ` +
                          `Following their path through the elements, they ended their run as '${player.Status}' during ${player.Episode}.`;

      // Complete chronological cycle list from your spreadsheet
      const chronologicalPhases = [
        { label: 'Start', key: 'Original' },
        { label: 'C16', key: 'Cycle 16' },
        { label: 'C17', key: 'Cycle 17' },
        { label: 'Shuffle', key: 'Shuffle' },
        { label: 'Expand', key: 'Expand' },
        { label: 'Swap', key: 'Swap' },
        { label: 'C34', key: 'Cycle 34' },
        { label: 'C35', key: 'Cycle 35' },
        { label: '2nd Exp', key: '2nd Exp' },
        { label: 'Switch', key: 'Switch' },
        { label: 'Dissolve', key: 'Disolve' },
        { label: 'Merge', key: 'Merge' }
      ];

      // Build active nodes where the player was actually in a team (ignoring blanks/NaN)
      let activeNodes = [];
      chronologicalPhases.forEach(phase => {
        const teamName = player[phase.key];
        if (teamName && teamName.trim() !== "" && teamName !== "nan") {
          activeNodes.push({
            label: phase.label,
            team: teamName
          });
        }
      });

      // Map the filtered nodes into styled HTML, linked together by transition arrows
      const timelineHTML = activeNodes.map((node, index) => {
        // Create a safe class name from the team name (e.g., "Contenders" -> "team-contenders")
        const teamClass = `team-${node.team.toLowerCase().replace(/\s+/g, '-')}`;
        
        const nodeMarkup = `
          <div class="timeline-node">
            <span class="node-phase">${node.label}</span>
            <span class="node-team ${teamClass}">${node.team}</span>
          </div>
        `;

        // Append transition arrow if this isn't the final node of their journey
        if (index < activeNodes.length - 1) {
          return nodeMarkup + `<span class="timeline-arrow">➔</span>`;
        }
        return nodeMarkup;
      }).join('');

      // Build the final card template
      return `
        <div class="player-card">
          <div>
            <div class="card-header">
              <h3>${player.Name}</h3>
              <span class="badge ${player.Legacy.toLowerCase().replace(/\s+/g, '-')}">${player.Legacy}</span>
            </div>
            
            <p class="card-description">"${summaryText}"</p>
            
            <div class="card-body">
              <p><strong>Status:</strong> ${player.Status}</p>
              <p><strong>Episode:</strong> ${player.Episode}</p>
            </div>
          </div>

          <div class="timeline-container">
            <div class="timeline-title">Contestant Journey</div>
            <div class="timeline-nodes">
              ${timelineHTML || '<span style="font-size:0.75rem; color:#666;">No transition history available</span>'}
            </div>
          </div>
        </div>
      `;
    }

    // 2. Fetch the player data and render the cards to the page
    const grid = document.getElementById('cards-grid');

    fetch('player_data.json')
      .then(response => {
        if (!response.ok) {
          throw new Error('Could not load player_data.json');
        }
        return response.json();
      })
      .then(players => {
        // Clear container and loop through players to inject each card
        grid.innerHTML = '';
        players.forEach(player => {
          grid.innerHTML += createPlayerCard(player);
        });
      })
      .catch(error => {
        console.error('Error fetching data:', error);
        grid.innerHTML = `<p style="color:red; text-align:center;">Failed to load player data. Please make sure player_data.json is in the same directory.</p>`;
      });
  </script>
</body>
</html>
