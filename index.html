<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementus: The Inferno // Player Database</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --card-bg: #1a1a22;
            --accent-color: #ff4a4a;
            --text-main: #ffffff;
            --text-muted: #9fa0b3;
            --win-color: #4caf50;
            --border-color: #2a2a35;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
            margin-top: 40px;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-main);
            font-weight: 900;
        }

        .subtitle {
            color: var(--accent-color);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 30px;
            font-size: 0.85rem;
        }

        .search-container {
            margin-bottom: 25px;
            position: relative;
        }

        .search-box {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 2px solid var(--border-color);
            padding: 14px 20px;
            font-size: 1rem;
            border-radius: 12px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(255, 74, 74, 0.2);
        }

        /* Dropdown suggestions list */
        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-top: none;
            border-radius: 0 0 12px 12px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 10;
            display: none;
            text-align: left;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        .suggestion-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background-color 0.2s;
        }

        .suggestion-item:hover {
            background-color: rgba(255, 74, 74, 0.1);
            color: var(--accent-color);
        }

        /* Player Card Styling */
        .player-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            padding: 35px 25px;
            border-top: 6px solid var(--accent-color);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(20px);
        }

        .player-card.active {
            opacity: 1;
            transform: translateY(0);
        }

        .player-name {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }

        .player-status {
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--win-color);
            font-weight: bold;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.02);
            padding: 18px 10px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: transform 0.2s;
        }

        .stat-box:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.04);
        }

        .stat-val {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-main);
            display: block;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 6px;
            display: block;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .footer-note {
            margin: 50px 0 20px 0;
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        /* Scrollbar styles for the suggestion list */
        .suggestions::-webkit-scrollbar {
            width: 8px;
        }
        .suggestions::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        .suggestions::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
    </style>
</head>

        function showSuggestions() {
            const input = document.getElementById('searchBox').value.toLowerCase();
            const suggestionsContainer = document.getElementById('suggestions');
            suggestionsContainer.innerHTML = '';

            if (input.length === 0) {
                suggestionsContainer.style.display = 'none';
                return;
            }

            let matches = 0;
            for (const key in playerData) {
                const player = playerData[key];
                if (player.name.toLowerCase().includes(input)) {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.innerText = player.name;
                    div.onclick = () => selectPlayer(key);
                    suggestionsContainer.appendChild(div);
                    matches++;
                }
            }

            if (matches > 0) {
                suggestionsContainer.style.display = 'block';
            } else {
                suggestionsContainer.style.display = 'none';
            }
        }

        function selectPlayer(key) {
            const player = playerData[key];
            const card = document.getElementById('playerCard');
            const searchBox = document.getElementById('searchBox');
            const suggestionsContainer = document.getElementById('suggestions');

            // Set text values
            searchBox.value = player.name;
            document.getElementById('cardName').innerText = player.name;
            document.getElementById('cardStatus').innerText = player.status;
            document.getElementById('cardWins').innerText = player.wins;
            document.getElementById('cardNoms').innerText = player.noms;
            document.getElementById('cardInfernos').innerText = player.infernos;

            // Hide suggestions and animate card in
            suggestionsContainer.style.display = 'none';
            card.classList.add('active');
        }

        // Hide suggestions when clicking outside
        document.addEventListener('click', function(e) {
            if (e.target.id !== 'searchBox') {
                document.getElementById('suggestions').style.display = 'none';
            }
        });
